[mypy]
python_version = 3.11
files = wms/emailing.py,wms/reference_sequences.py,wms/public_link_helpers.py,wms/portal_helpers.py,wms/document_scan.py,wms/document_scan_queue.py,wms/document_uploads.py,wms/upload_utils.py,wms/client_ip.py,wms/shipment_document_handlers.py,wms/shipment_tracking_handlers.py,wms/order_helpers.py,wms/order_scan_handlers.py,wms/public_order_helpers.py,wms/views_public_order.py,wms/organization_role_resolvers.py,wms/management/commands/process_document_scan_queue.py,wms/management/commands/check_document_scan_runtime.py
ignore_missing_imports = True
follow_imports = silent
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = False
disallow_untyped_defs = False
check_untyped_defs = False
no_implicit_optional = True
show_error_codes = True
pretty = True

[mypy-*.migrations.*]
ignore_errors = True

[mypy-wms.client_ip]
check_untyped_defs = True

[mypy-wms.upload_utils]
check_untyped_defs = True

[mypy-wms.document_scan]
check_untyped_defs = True

[mypy-wms.document_scan_queue]
check_untyped_defs = True

[mypy-wms.management.commands.process_document_scan_queue]
check_untyped_defs = True

[mypy-wms.management.commands.check_document_scan_runtime]
check_untyped_defs = True
