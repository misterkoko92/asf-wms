<script>
  (function() {
    function syncFlightSelect(dateSelect) {
      const targetId = dateSelect.dataset.target;
      if (!targetId) return;
      const flightSelect = document.getElementById(targetId);
      if (!flightSelect) return;
      const selectedDate = dateSelect.value;
      let firstVisible = null;
      Array.from(flightSelect.options).forEach((option) => {
        const isVisible = option.dataset.flightDate === selectedDate;
        option.hidden = !isVisible;
        if (isVisible && firstVisible === null) {
          firstVisible = option;
        }
      });
      if (flightSelect.selectedOptions.length === 0 || flightSelect.selectedOptions[0].hidden) {
        if (firstVisible) {
          firstVisible.selected = true;
        }
      }
      syncVolunteerSelect(flightSelect);
    }

    function toneStyle(tone) {
      switch (tone) {
        case "green":
          return "background-color: #e6f6ea;";
        case "orange":
          return "background-color: #fff1db;";
        case "red":
          return "background-color: #f8d7da;";
        default:
          return "";
      }
    }

    function syncVolunteerSelect(flightSelect) {
      const targetId = flightSelect.dataset.volunteerTarget;
      if (!targetId) return;
      const volunteerSelect = document.getElementById(targetId);
      if (!volunteerSelect) return;
      const selectedFlight = flightSelect.value;
      Array.from(volunteerSelect.options).forEach((option) => {
        const rawTones = option.dataset.flightTones || "";
        const toneMap = Object.fromEntries(
          rawTones
            .split(",")
            .filter(Boolean)
            .map((entry) => entry.split(":"))
            .filter((entry) => entry.length === 2)
        );
        option.style.cssText = toneStyle(toneMap[selectedFlight] || "none");
      });
    }

    document.querySelectorAll("[data-flight-date-select]").forEach((select) => {
      syncFlightSelect(select);
      select.addEventListener("change", () => syncFlightSelect(select));
    });
    document.querySelectorAll("[data-flight-select]").forEach((select) => {
      syncVolunteerSelect(select);
      select.addEventListener("change", () => syncVolunteerSelect(select));
    });
  })();
</script>
