{% load i18n %}

<section id="user-fields" data-account-section="{{ ACCOUNT_TYPE_USER }}">
  <div class="scan-field">
    <label class="form-label" for="requested_username">{% trans "Nom d'utilisateur" %}</label>
    <input
      class="form-control"
      type="text"
      id="requested_username"
      name="requested_username"
      value="{{ form_data.requested_username }}"
      autocomplete="username"
    >
  </div>
  <div class="scan-field">
    <label class="form-label" for="password1">{% trans "Mot de passe" %}</label>
    <input class="form-control" type="password" id="password1" name="password1" autocomplete="new-password">
  </div>
  <div class="scan-field">
    <label class="form-label" for="password2">{% trans "Confirmer le mot de passe" %}</label>
    <input class="form-control" type="password" id="password2" name="password2" autocomplete="new-password">
  </div>
</section>
