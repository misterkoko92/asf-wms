<div class="{{ wrapper_classes }}"{% if attrs %}{{ attrs }}{% endif %}>
  {% if label %}
    <label class="form-label" for="{{ field_id }}">{{ label }}</label>
  {% endif %}
  {{ field_html }}
  {% if help_text %}
    <div class="form-text">{{ help_text }}</div>
  {% endif %}
  {% for error in errors %}
    <div class="text-danger small">{{ error }}</div>
  {% endfor %}
</div>
