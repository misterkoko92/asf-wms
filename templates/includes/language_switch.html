{% load i18n %}
{% get_current_language as LANGUAGE_CODE %}
<div class="wms-language-switch{% if compact %} wms-language-switch--compact{% endif %}">
  <form method="post" action="{% url 'set_language' %}" class="wms-language-switch__form">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.get_full_path }}">
    <button
      type="submit"
      name="language"
      value="fr"
      class="wms-language-switch__btn{% if LANGUAGE_CODE|slice:':2' == 'fr' %} is-active{% endif %}"
      aria-label="{% trans "Français" %}"
    >
      <span aria-hidden="true">🇫🇷</span>
      <span>{% trans "Français" %}</span>
    </button>
    <button
      type="submit"
      name="language"
      value="en"
      class="wms-language-switch__btn{% if LANGUAGE_CODE|slice:':2' == 'en' %} is-active{% endif %}"
      aria-label="{% trans "English" %}"
    >
      <span aria-hidden="true">🇬🇧</span>
      <span>{% trans "English" %}</span>
    </button>
  </form>
</div>
