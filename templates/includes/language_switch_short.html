{% load i18n %}
{% get_current_language as LANGUAGE_CODE %}
<div class="d-flex justify-content-end">
  <form method="post" action="{% url 'set_language' %}" class="d-flex gap-1 align-items-center">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ request.get_full_path }}">
    <button
      type="submit"
      name="language"
      value="fr"
      class="btn btn-sm {% if LANGUAGE_CODE|slice:':2' == 'fr' %}btn-primary{% else %}btn-outline-secondary{% endif %}"
      aria-label="{% trans "Français" %}"
    >
      FR
    </button>
    <button
      type="submit"
      name="language"
      value="en"
      class="btn btn-sm {% if LANGUAGE_CODE|slice:':2' == 'en' %}btn-primary{% else %}btn-outline-secondary{% endif %}"
      aria-label="{% trans "English" %}"
    >
      ENG
    </button>
  </form>
</div>
