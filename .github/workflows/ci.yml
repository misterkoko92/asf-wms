name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  precommit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.9"
          enable-cache: true

      - name: Run pre-commit
        run: uv run --with pre-commit==4.5.1 pre-commit run --all-files --show-diff-on-failure

  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_SECRET_KEY: "ci-super-strong-secret-key-ABCDEFGHIJKLMNOPQRSTUVWXYZ-1234567890!@#$%^&*()"
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.9"
          enable-cache: true

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential default-libmysqlclient-dev pkg-config

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Dependency consistency check
        run: uv run python -m pip check

      - name: Django deploy check
        env:
          SECURE_SSL_REDIRECT: "true"
          SESSION_COOKIE_SECURE: "true"
          CSRF_COOKIE_SECURE: "true"
          SECURE_HSTS_SECONDS: "31536000"
        run: uv run python manage.py check --deploy --fail-level WARNING

      - name: Migration check
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Lint (fatal rules)
        run: uv run ruff check .

      - name: Type check (mypy scoped)
        run: uv run make typecheck

      - name: Type check (pyright shadow, standard mode)
        continue-on-error: true
        run: uv run make typecheck-pyright

      - name: Security scan (Bandit)
        run: |
          uv run bandit -r asf_wms api contacts wms -x "wms/migrations,contacts/migrations,wms/tests,api/tests,contacts/tests"

      - name: Run tests with coverage
        run: |
          COVERAGE_FAIL_UNDER=93 uv run make coverage

      - name: Dependency vulnerability audit (informational)
        continue-on-error: true
        run: |
          uv run pip-audit -r requirements.txt --format json --output pip-audit-report.json || true
          test -f pip-audit-report.json || echo '{"error":"pip-audit did not produce output"}' > pip-audit-report.json
          cat pip-audit-report.json

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload dependency audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
